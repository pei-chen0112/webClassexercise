<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>HTML iframe 練習 - 維基百科</title>
    <style>
        /* 這裡定義 iframe 的大小與邊框樣式 */
        .my-iframe {
            width: 500px;  /* 寬度 500 像素 */
            height: 500px; /* 高度 500 像素 */
            border: none;  /* 移除邊框 (CSS 實作) */
        }
    </style>
</head>
<body>

    <h1>我的內嵌網頁 - 維基百科</h1>
    
    <iframe 
        src="https://zh.m.wikipedia.org/wiki/HTML" 
        class="my-iframe">
    </iframe>

</body>
</html>
