<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>HTML iframe 練習</title>
    <style>
        /* 使用 CSS 設定 iframe 的樣式 */
        .my-iframe {
            width: 500px;
            height: 500px;
            border: none; /* 移除邊框 */
        }
    </style>
</head>
<body>

    <h1>我的內嵌網頁</h1>
    
    <iframe 
        src="https://www.w3schools.com" 
        class="my-iframe">
    </iframe>

</body>
</html>
